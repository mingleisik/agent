name: 自动签到任务

on:
  repository_dispatch:
    types: [agent]
  workflow_dispatch:

concurrency:
  group: agentrouter-checkin
  cancel-in-progress: true

jobs:
  run-daily-checkin:
    name: ✅ 每日自动签到
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. 安装自动化底层框架
        run: |
          python -m pip install --upgrade pip
          pip install -U seleniumbase

      - name: 4. 安装虚拟显示外壳
        run: sudo apt-get update && sudo apt-get install -y xvfb xdotool

      - name: 5. 恢复 Chrome Profile 缓存
        uses: actions/cache/restore@v4
        with:
          path: ~/.chrome-profile-agentrouter
          key: chrome-profile-agentrouter-v1-${{ github.run_id }}
          restore-keys: |
            chrome-profile-agentrouter-v1-
          fail-on-cache-miss: false

      - name: 6. 验证 Profile 完整性
        run: |
          if [ ! -d "$HOME/.chrome-profile-agentrouter/Default" ]; then
            echo "⚠️ Profile 目录不存在，将作为全新任务启动登录流程"
          else
            echo "✅ Profile 目录结构完整"
          fi

      - name: 7. 按需下载并配置 Sing-Box 代理
        if: env.PROXY_STR != ''
        env:
          PROXY_STR: ${{ secrets.PROXY_STR }}
        run: |
          echo "检测到代理配置，正在拉起 Sing-Box..."
          curl -LO https://github.com/SagerNet/sing-box/releases/download/v1.9.3/sing-box-1.9.3-linux-amd64.tar.gz
          tar -xzf sing-box-1.9.3-linux-amd64.tar.gz
          sudo cp sing-box-1.9.3-linux-amd64/sing-box /usr/local/bin/
          if [ -f convert_proxy.py ]; then
            python convert_proxy.py
          else
            echo "⚠️ convert_proxy.py 不存在，跳过转换"
          fi
          nohup sing-box run -c config.json > singbox.log 2>&1 &
          sleep 3
          curl -sS --socks5 127.0.0.1:8080 -o /dev/null -w "代理隧道建立成功！\n" https://api.ipify.org || echo "⚠️ 代理可能未就绪，继续执行"

      - name: 8. 执行签到脚本
        env:
          PROXY_STR: ${{ secrets.PROXY_STR }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          BROWSER_USER_DATA_DIR: /home/runner/.chrome-profile-agentrouter
        run: |
          if [ -n "$PROXY_STR" ]; then
            echo "启用 BROWSER_PROXY 走代理节点隧道"
            export BROWSER_PROXY="http://127.0.0.1:8080"
          else
            echo "未配置代理，使用原生 IP 直接访问"
          fi
          xvfb-run --auto-servernum python main.py

      - name: 9. 仅在签到成功时回存 Profile
        uses: actions/cache/save@v4
        if: success()
        with:
          path: ~/.chrome-profile-agentrouter
          key: chrome-profile-agentrouter-v1-${{ github.run_id }}
